<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Pixel War Simulator - Mobile & Fixes Update</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; }
        body { background-color: #000; overflow: hidden; user-select: none; touch-action: none; }
        canvas { display: block; width: 100vw; height: 100vh; cursor: crosshair; }
        
        #toolbar {
            position: absolute; top: 0; left: 0; width: 250px; height: 100vh;
            background: rgba(15, 15, 25, 0.85); backdrop-filter: blur(8px);
            border-right: 2px solid #334; padding: 15px 10px; color: white;
            display: flex; flex-direction: column; gap: 8px; overflow-y: auto; z-index: 20;
            transition: transform 0.3s ease;
        }
        #toolbar::-webkit-scrollbar { width: 6px; }
        #toolbar::-webkit-scrollbar-thumb { background: #556; border-radius: 3px; }
        
        #mobile-menu-btn {
            display: none; position: absolute; top: 10px; left: 10px; z-index: 30;
            background: #a82eff; color: black; border: none; padding: 10px 15px;
            font-weight: bold; border-radius: 5px; cursor: pointer; box-shadow: 0 4px 10px rgba(0,0,0,0.5);
        }

        #mobile-pan-toggle {
            display: none; position: absolute; bottom: 20px; left: 50%; transform: translateX(-50%); z-index: 30;
            background: #2a2a3a; color: #fff; border: 2px solid #a82eff; padding: 12px 25px;
            font-weight: bold; border-radius: 25px; cursor: pointer; box-shadow: 0 4px 15px rgba(168,46,255,0.4);
            font-size: 1rem;
        }
        #mobile-pan-toggle.pan-mode { background: #a82eff; color: #000; }

        h2 { font-size: 1.1rem; margin-bottom: 5px; text-align: center; color: #fff; text-transform: uppercase; letter-spacing: 1px;}
        h3 { font-size: 0.8rem; color: #a82eff; border-bottom: 1px solid #445; padding-bottom: 3px; margin-top: 10px; text-transform: uppercase; letter-spacing: 1px;}
        .btn { 
            background: #2a2a3a; border: 1px solid #445; color: #ddd; padding: 6px 8px; 
            border-radius: 5px; cursor: pointer; text-align: left; transition: 0.2s;
            display: flex; justify-content: space-between; align-items: center; font-size: 0.85rem;
        }
        .btn:hover { background: #3a3a4a; border-color: #a82eff; }
        .btn.active { background: #a82eff; color: black; font-weight: bold; box-shadow: 0 0 10px #a82eff; }
        .btn.danger { background: #511; border-color: #f00; color: #f88; text-align: center; justify-content: center; font-weight: bold; margin-top: 10px;}
        .btn.danger:hover { background: #f00; color: white; box-shadow: 0 0 15px #f00; }
        .btn.laser { background: #155; border-color: #0ff; color: #8ff; text-align: center; justify-content: center; font-weight: bold; margin-top: 5px;}
        .btn.laser:hover { background: #0ff; color: black; box-shadow: 0 0 15px #0ff;}
        .btn.glitch { background: #115; border-color: #00f; color: #88f; text-align: center; justify-content: center; font-weight: bold; margin-top: 5px; animation: glitch 2s infinite; }
        .btn.glitch:hover { background: #00f; color: white; }

        @keyframes glitch { 0% { transform: translate(0) } 20% { transform: translate(-2px, 1px) } 40% { transform: translate(-1px, -1px) } 60% { transform: translate(2px, 1px) } 80% { transform: translate(1px, -1px) } 100% { transform: translate(0) } }
        
        #ui-layer {
            position: absolute; top: 10px; right: 20px; left: 270px;
            display: flex; justify-content: space-between; align-items: flex-start;
            pointer-events: none; z-index: 5; transition: left 0.3s ease;
        }

        #time-display, #stats-display, #controls-display {
            color: white; font-family: monospace; font-size: 14px; text-shadow: 1px 1px 4px black;
            background: rgba(0,0,0,0.6); padding: 5px 15px; border-radius: 5px; text-align: center; backdrop-filter: blur(4px);
        }
        .stat-ally { color: #6a6; font-weight: bold; }
        .stat-enemy { color: #d44; font-weight: bold; }
        .stat-civ { color: #aaa; font-weight: bold; }

        .side-toggle-container { display: flex; gap: 5px; margin-bottom: 5px; }
        .side-btn { flex: 1; text-align: center; justify-content: center; padding: 6px; border-radius: 5px; cursor: pointer; border: 1px solid #445; font-weight: bold; transition: 0.2s; font-size: 0.8rem;}
        .side-btn.ally { background: #2a2a3a; color: #6a6; }
        .side-btn.enemy { background: #2a2a3a; color: #d44; }
        .side-btn.civilian { background: #2a2a3a; color: #aaa; }
        .side-btn.ally.active { background: #6a6; color: black; box-shadow: 0 0 10px #6a6; }
        .side-btn.enemy.active { background: #d44; color: black; box-shadow: 0 0 10px #d44; }
        .side-btn.civilian.active { background: #aaa; color: black; box-shadow: 0 0 10px #aaa; }

        .slider-container { display: flex; align-items: center; justify-content: space-between; padding: 5px 0; }
        input[type=range] { flex: 1; margin-left: 10px; cursor: pointer; accent-color: #a82eff;}

        @media (max-width: 768px) {
            #mobile-menu-btn { display: block; }
            #mobile-pan-toggle { display: block; }
            #toolbar { transform: translateX(-100%); width: 240px; }
            #toolbar.open { transform: translateX(0); }
            #ui-layer { left: 10px; top: 50px; flex-direction: column; gap: 10px; right: 10px; align-items: flex-end; }
            #controls-display { display: none; }
            #time-display, #stats-display { font-size: 11px; padding: 4px 10px; }
        }
    </style>
</head>
<body>

    <button id="mobile-menu-btn" onclick="toggleMenu()">🍔 Menu</button>
    <button id="mobile-pan-toggle" onclick="toggleMobilePanMode()">👆 Mode: Tool</button>

    <div id="toolbar">
        <h2 style="margin-top: 30px;">War Sandbox</h2>
        
        <h3>Audio Settings</h3>
        <div class="slider-container">
            <span>🔊</span>
            <input type="range" id="vol-slider" min="0" max="1" step="0.1" value="0.3" onchange="audioSystem.setVolume(this.value)">
        </div>

        <button class="btn" onclick="setWeather('thunderstorm')">⛈️ Thunderstorm</button>

        <h3>Team Selector</h3>
        <div class="side-toggle-container">
            <div id="btn-ally" class="side-btn ally active" onclick="setSpawnSide('ally')">ALLIES</div>
            <div id="btn-civilian" class="side-btn civilian" onclick="setSpawnSide('civilian')">CIV</div>

        </div>

        <button class="btn" onclick="setTool('Rocketeer', this)">🟢 Rocketeer</button>

        <button class="btn" onclick="setTool('Medic', this)">🟢 Medic</button>
        <button class="btn" onclick="setTool('Commander', this)">⭐ Commander</button>

        <button class="btn" onclick="setMap('grassland')">🌲 Grassland</button>

    <div id="ui-layer">
        <div id="controls-display">WASD: Pan/Move | Scroll: Zoom | Mouse: Aim</div>
        <div id="stats-display">Wind: <span id="wind-display">0</span>mph | Allies: <span class="stat-ally" id="count-ally">0</span> | Enemies: <span class="stat-enemy" id="count-enemy">0</span> | Civs: <span class="stat-civ" id="count-civ">0</span></div>
        <div id="time-display">Day 1 | 08:00</div>
    </div>
    
    <canvas id="gameCanvas"></canvas>

    <script>
        const canvas = document.getElementById('gameCanvas');
        const ctx = canvas.getContext('2d', { alpha: false });
        const lightCanvas = document.createElement('canvas');
        const lightCtx = lightCanvas.getContext('2d');
        const bloomCanvas = document.createElement('canvas');
        const bloomCtx = bloomCanvas.getContext('2d');
        
        // --- FPS LIMITER ---
        const FPS_LIMIT = 60;
        const fpsInterval = 1000 / FPS_LIMIT;
        let then = performance.now();
        let now, elapsed;

        // --- CAMERA SYSTEM & INPUTS ---
        const camera = { x: 0, y: 0, zoom: 1, targetZoom: 1 };
        const keys = {};
        let isMouseDown = false;
        let possessedEntity = null; 
        let mobilePanMode = false; // Toggle for mobile users

        window.addEventListener('keydown', e => keys[e.key.toLowerCase()] = true);
        window.addEventListener('keyup', e => keys[e.key.toLowerCase()] = false);
        window.addEventListener('wheel', e => {
            camera.targetZoom *= (e.deltaY > 0 ? 0.8 : 1.25);
            camera.targetZoom = Math.max(0.2, Math.min(camera.targetZoom, 3));
        });

        function screenToWorld(sx, sy) {
            return { x: (sx - canvas.width / 2) / camera.zoom + camera.x, y: (sy - canvas.height / 2) / camera.zoom + camera.y };
        }

        // --- PROCEDURAL AUDIO ENGINE ---
        const audioSystem = {
            ctx: null, masterGain: null, initialized: false,
            init: function() {
                if (this.initialized) return;
                this.ctx = new (window.AudioContext || window.webkitAudioContext)();
                this.masterGain = this.ctx.createGain();
                this.masterGain.gain.value = document.getElementById('vol-slider').value;
                this.masterGain.connect(this.ctx.destination);
                this.initialized = true;
            },
            resume: function() { if (this.ctx && this.ctx.state === 'suspended') this.ctx.resume(); },
            setVolume: function(val) { if(this.masterGain) this.masterGain.gain.value = val; },
            playTone: function(freq, type, duration, vol, drop = 0, noise = false) {
                if(!this.initialized) return;
                let osc = this.ctx.createOscillator();
                let gain = this.ctx.createGain();
                osc.type = type; 
                osc.frequency.setValueAtTime(freq, this.ctx.currentTime);
                if (drop > 0) osc.frequency.exponentialRampToValueAtTime(Math.max(1, freq - drop), this.ctx.currentTime + duration);
                gain.gain.setValueAtTime(vol, this.ctx.currentTime);
                gain.gain.exponentialRampToValueAtTime(0.01, this.ctx.currentTime + duration);
                osc.connect(gain); gain.connect(this.masterGain);
                osc.start(); osc.stop(this.ctx.currentTime + duration);
            },
            shoot: function() { this.playTone(Math.random()*150+300, 'square', 0.1, 0.05, 100); },
            heavyShoot: function() { this.playTone(Math.random()*100+150, 'sawtooth', 0.15, 0.08, 50); },
            explosion: function() { this.playTone(Math.random()*40+40, 'square', 0.4, 0.2, 30); },
            hit: function() { this.playTone(Math.random()*100+200, 'triangle', 0.1, 0.03); },
            thunder: function() { this.playTone(Math.random()*20+30, 'sawtooth', 1.5, 0.3, 10); },
            splash: function() { this.playTone(Math.random()*100+300, 'sine', 0.2, 0.05, 50); },
            fart: function() { this.playTone(Math.random()*20+40, 'sawtooth', 0.5, 0.3, 20); } 
        };

        const entities = [], particles = [], structures = [], orbitalLasers = [], lightningBolts = [], tornadoes = [], ragdolls = [];
        const MAX_PARTICLES = 3000; 
        let gameTime = 8, dayCount = 1, bgElements = [], currentWeather = 'clear';
        let nukeFlash = 0, screenShake = 0, lightningFlash = 0, isBSOD = false, isDisco = false;
        let spawnSide = 'ally'; 
        let globalWaterLevel = 1000; 
        let globalWind = 0, targetWind = 0; 

        // --- INFINITE CHUNK SYSTEM ---
        const CHUNK_SIZE = 400;
        const FARLANDS_THRESHOLD = 15000;
        const terrainChunks = new Map();

        function generateChunk(cx) {
            let chunk = new Float32Array(CHUNK_SIZE);
            for(let i=0; i<CHUNK_SIZE; i++) {
                let wx = cx * CHUNK_SIZE + i;
                let dist = Math.abs(wx);
                let baseHeight = canvas.height - 100;
                
                let h = Math.sin(wx * 0.002) * 40 + Math.sin(wx * 0.007) * 15;
                if (dist > FARLANDS_THRESHOLD) {
                    let chaos = Math.min((dist - FARLANDS_THRESHOLD) / 5000, 3);
                    h += Math.tan(wx * 0.05) * 50 * chaos; 
                    if (Math.random() < 0.05 * chaos) h -= Math.random() * 300 * chaos; 
                }
                chunk[i] = baseHeight - h;
            }
            terrainChunks.set(cx, chunk);
        }

        function getGroundY(x) {
            let chunkX = Math.floor(x / CHUNK_SIZE);
            let localX = Math.floor(x) - (chunkX * CHUNK_SIZE);
            if (localX < 0) localX += CHUNK_SIZE; 
            if (!terrainChunks.has(chunkX)) generateChunk(chunkX);
            return terrainChunks.get(chunkX)[localX];
        }

        function destroyTerrain(x, radius) {
            let cx = Math.floor(x);
            for(let i = cx - radius; i <= cx + radius; i++) {
                let chunkX = Math.floor(i / CHUNK_SIZE);
                let localX = i - (chunkX * CHUNK_SIZE);
                if (localX < 0) localX += CHUNK_SIZE;
                if (!terrainChunks.has(chunkX)) generateChunk(chunkX);
                
                let dist = Math.abs(cx - i);
                let depth = Math.sqrt(radius * radius - dist * dist);
                let chunk = terrainChunks.get(chunkX);
                chunk[localX] = Math.min(canvas.height + 500, chunk[localX] + depth);
            }
        }

        function toggleMenu() { document.getElementById('toolbar').classList.toggle('open'); }
        function toggleDisco() { isDisco = !isDisco; if(isDisco) audioSystem.playTone(300, 'square', 0.5, 0.1, 100); }
        
        function toggleMobilePanMode() {
            mobilePanMode = !mobilePanMode;
            const btn = document.getElementById('mobile-pan-toggle');
            if(mobilePanMode) {
                btn.innerText = "🖐️ Mode: Pan Camera";
                btn.classList.add('pan-mode');
            } else {
                btn.innerText = "👆 Mode: Tool";
                btn.classList.remove('pan-mode');
            }
        }

        function generateLightningPath(x1, y1, x2, y2, segments, jitter = 30) {
            let path = [{x: x1, y: y1}];
            let dx = (x2 - x1) / segments, dy = (y2 - y1) / segments;
            let cx = x1, cy = y1;
            for(let i=1; i<segments; i++) { cx += dx + (Math.random()-0.5) * jitter; cy += dy + (Math.random()-0.5) * jitter; path.push({x: cx, y: cy}); }
            path.push({x: x2, y: y2});
            return path;
        }

        // --- VERLET RAGDOLL PHYSICS ---
        class VerletPoint { constructor(x, y) { this.x = x; this.y = y; this.oldx = x; this.oldy = y; } }
        class VerletStick {
            constructor(p1, p2, len) { this.p1 = p1; this.p2 = p2; this.len = len || Math.hypot(p1.x-p2.x, p1.y-p2.y); }
            update() {
                let dx = this.p2.x - this.p1.x, dy = this.p2.y - this.p1.y, dist = Math.hypot(dx, dy);
                if(dist === 0) return;
                let percent = ((this.len - dist) / dist) / 2;
                let offsetX = dx * percent, offsetY = dy * percent;
                this.p1.x -= offsetX; this.p1.y -= offsetY; this.p2.x += offsetX; this.p2.y += offsetY;
            }
        }
        class Ragdoll {
            constructor(x, y, color, forceX, forceY) {
                this.points = []; this.sticks = []; this.color = color; this.life = 600;
                let head = new VerletPoint(x, y), neck = new VerletPoint(x, y+5), pelvis = new VerletPoint(x, y+15);
                let lHand = new VerletPoint(x-8, y+10), rHand = new VerletPoint(x+8, y+10);
                let lFoot = new VerletPoint(x-5, y+25), rFoot = new VerletPoint(x+5, y+25);
                pelvis.oldx -= forceX; pelvis.oldy -= forceY; head.oldx -= forceX*1.2; head.oldy -= forceY*1.2;
                this.points.push(head, neck, pelvis, lHand, rHand, lFoot, rFoot);
                this.sticks.push(new VerletStick(head, neck, 5), new VerletStick(neck, pelvis, 10), new VerletStick(neck, lHand, 12), new VerletStick(neck, rHand, 12), new VerletStick(pelvis, lFoot, 12), new VerletStick(pelvis, rFoot, 12));
            }
            update() {
                this.life--;
                for(let p of this.points) {
                    let vx = (p.x - p.oldx) * 0.98, vy = (p.y - p.oldy) * 0.98;
                    p.oldx = p.x; p.oldy = p.y;
                    p.x += vx + globalWind * 0.05; 
                    p.y += vy + 0.5;
                    let gy = getGroundY(p.x);
                    if (p.y > gy) { p.y = gy; p.oldx = p.x - vx * 0.5; }
                    if (p.y > globalWaterLevel) { p.y -= 0.6; p.oldx = p.x - vx * 0.9; } 
                }
                for(let i=0; i<3; i++) { for(let s of this.sticks) s.update(); }
            }
            draw() {
                ctx.globalAlpha = Math.min(1, this.life / 100); ctx.strokeStyle = this.color; ctx.lineWidth = 3; ctx.lineCap = 'round';
                ctx.beginPath(); for(let s of this.sticks) { ctx.moveTo(s.p1.x, s.p1.y); ctx.lineTo(s.p2.x, s.p2.y); } ctx.stroke();
                ctx.beginPath(); ctx.arc(this.points[0].x, this.points[0].y, 4, 0, Math.PI*2); ctx.stroke(); ctx.globalAlpha = 1;
            }
        }

        // UTILITY FUNCTIONS
        function addParticle(x, y, vx, vy, color, life, size, type, isEnemy = false, damage = 0) {
            if (particles.length < MAX_PARTICLES) particles.push(new Particle(x, y, vx, vy, color, life, size, type, isEnemy, damage));
        }

        function createExplosion(x, y, amount, damageRadius = true, customDamage = 40) {
            audioSystem.explosion();
            const colors = ['#ff0000', '#ff4500', '#ffa500', '#ffff00', '#fff'];
            for (let i = 0; i < amount; i++) addParticle(x, y, (Math.random() - 0.5)*15, (Math.random() - 0.5)*15, colors[Math.floor(Math.random()*colors.length)], Math.random()*25+10, Math.random()*8+2, 'explosion');
            if (damageRadius) { damageArea(x, y, customDamage); destroyTerrain(x, Math.min(80, amount * 2)); }
            
            for(let e of entities) {
                if(e.side === 'civilian' && !e.dead && Math.hypot(e.x-x, e.y-y) < 400) { e.aiState = 'panic'; e.speak("AAAH!"); e.dir = e.x > x ? 1 : -1; }
            }
        }

        function createBlood(x, y, amount) {
            for (let i = 0; i < amount; i++) addParticle(x, y, (Math.random() - 0.5)*6, (Math.random() - 1)*5, '#8b0000', Math.random()*80+40, Math.random()*4+2, 'blood');
        }

        function damageArea(ex, ey, damage = 40) {
            for (let s of structures) {

        function generateBackground() {

        function drawParallaxBackground(darkness) {
            ctx.save();
            let bgWidth = 10000;
            let parallaxX = (camera.x * 0.3);
            let startOffset = Math.floor(parallaxX / bgWidth) * bgWidth;
            ctx.translate(-parallaxX, 0); 
            for (let loop = -1; loop <= 1; loop++) {
                ctx.save();
                ctx.translate(startOffset + loop * bgWidth, 0);
                for (let bg of bgElements) {
                    ctx.fillStyle = bg.color;
                    if (bg.type === 'hill') { ctx.beginPath(); ctx.arc(bg.x, bg.y, bg.r, Math.PI, 0); ctx.fill();
                    } else if (bg.type === 'spike') { ctx.beginPath(); ctx.moveTo(bg.x - bg.r/2, bg.y); ctx.lineTo(bg.x, bg.y - bg.r); ctx.lineTo(bg.x + bg.r/2, bg.y); ctx.fill();
                    } else if (bg.type === 'bg_tree') { 
                        ctx.fillRect(Math.trunc(bg.x), Math.trunc(bg.y), Math.trunc(bg.w), Math.trunc(bg.h));
                        ctx.beginPath(); ctx.arc(bg.x + bg.w/2, bg.y, bg.w*1.5, 0, Math.PI*2); ctx.fill();
                        ctx.beginPath(); ctx.arc(bg.x - bg.w*0.5, bg.y + bg.w, bg.w*1.2, 0, Math.PI*2); ctx.fill();
                        ctx.beginPath(); ctx.arc(bg.x + bg.w*1.5, bg.y + bg.w, bg.w*1.2, 0, Math.PI*2); ctx.fill();
                    } else if (bg.type === 'building') { ctx.fillRect(Math.trunc(bg.x), Math.trunc(bg.y), Math.trunc(bg.w), Math.trunc(bg.h));
                        if (bg.windows && darkness > 0.3) { ctx.fillStyle = `rgba(255, 255, 150, ${(darkness - 0.3)})`;
                            for(let wx = bg.x + 5; wx < bg.x + bg.w - 10; wx += 15) { for(let wy = bg.y + 10; wy < bg.y + bg.h - 20; wy += 20) if (Math.random() > 0.3) ctx.fillRect(wx, wy, 8, 12); }
                        }
                    } else if (bg.type === 'ruin') {
                        ctx.beginPath(); ctx.moveTo(bg.x, bg.y + bg.h); ctx.lineTo(bg.x, bg.y + bg.jagged[0]); let step = bg.w / bg.jagged.length;
                        for(let i=0; i<bg.jagged.length; i++) ctx.lineTo(bg.x + step*i, bg.y + bg.jagged[i]);
                        ctx.lineTo(bg.x + bg.w, bg.y + bg.jagged[bg.jagged.length-1]); ctx.lineTo(bg.x + bg.w, bg.y + bg.h); ctx.fill();
                    }
                }
                ctx.restore();
            }
            ctx.restore();
        }

        function handleInputStart(e, sx, sy) {
            audioSystem.init(); audioSystem.resume(); 
            isMouseDown = true;
            mouseX = sx; mouseY = sy; let w = screenToWorld(sx, sy);
            
            if (currentTool === 'grab') {
                for (let i = entities.length - 1; i >= 0; i--) {
                    let ent = entities[i];
                    if (!ent.dead && w.x > ent.x && w.x < ent.x + ent.width && w.y > ent.y && w.y < ent.y + ent.height) { draggedObj = ent; return; }
                }
                for (let i = structures.length - 1; i >= 0; i--) {
                    let s = structures[i];
                    if (!s.destroyed && w.x > s.x && w.x < s.x + s.width && w.y > s.y && w.y < s.y + s.height) { draggedObj = s; s.isRipped = true; return; }
                }
            } else if (currentTool === 'MindControl') {
                for (let i = entities.length - 1; i >= 0; i--) {
                    let ent = entities[i];
                    if (!ent.dead && w.x > ent.x && w.x < ent.x + ent.width && w.y > ent.y && w.y < ent.y + ent.height) { 
                        if(possessedEntity) possessedEntity.isPossessed = false;
                        possessedEntity = ent; ent.isPossessed = true; return; 
                    }
                }
            } else if (currentTool === 'AirStrike') {
                for(let i=0; i<8; i++) {
                    setTimeout(() => { addParticle(w.x + (i*60) - 200, camera.y - canvas.height/camera.zoom, 2, 8, '#222', 150, 8, 'bomb', false, 150); addParticle(w.x - (i*60) + 200, camera.y - canvas.height/camera.zoom - 50, -2, 8, '#222', 150, 8, 'bomb', false, 150); }, i * 200);
                }

            } else if (currentTool === 'BananaBomb') { addParticle(w.x, camera.y - canvas.height/camera.zoom, 0, 5, '#ff0', 200, 10, 'banana_cluster');
            } else spawnEntity(currentTool, w.x, w.y);
        }

        canvas.addEventListener('mousedown', (e) => { if (e.button === 0) handleInputStart(e, e.clientX, e.clientY); });

        // MOBILE MULTI-TOUCH
        let lastTouchCenter = null;
        let lastTouchDist = null;

        canvas.addEventListener('touchstart', (e) => { 
            audioSystem.init(); audioSystem.resume();
            isMouseDown = true;
            if (e.touches.length === 2) {
                let dx = e.touches[0].clientX - e.touches[1].clientX; let dy = e.touches[0].clientY - e.touches[1].clientY;
                lastTouchDist = Math.hypot(dx, dy);
                lastTouchCenter = { x: (e.touches[0].clientX + e.touches[1].clientX) / 2, y: (e.touches[0].clientY + e.touches[1].clientY) / 2 };
                draggedObj = null; 
            } else if (e.touches.length === 1) { 
                lastTouchCenter = null; lastTouchDist = null;
                if(mobilePanMode && !possessedEntity) {
                    lastTouchCenter = { x: e.touches[0].clientX, y: e.touches[0].clientY };
                } else {
                    handleInputStart(e, e.touches[0].clientX, e.touches[0].clientY); 
                }
            }
        }, {passive: false});

        canvas.addEventListener('touchmove', (e) => {
            e.preventDefault(); 
            if (e.touches.length === 2 && lastTouchCenter && lastTouchDist) {
                let dx = e.touches[0].clientX - e.touches[1].clientX; let dy = e.touches[0].clientY - e.touches[1].clientY;
                let dist = Math.hypot(dx, dy); let center = { x: (e.touches[0].clientX + e.touches[1].clientX) / 2, y: (e.touches[0].clientY + e.touches[1].clientY) / 2 };

                let zoomDelta = dist / lastTouchDist; camera.targetZoom *= zoomDelta; camera.targetZoom = Math.max(0.2, Math.min(camera.targetZoom, 3)); camera.zoom = camera.targetZoom; 
                camera.x -= (center.x - lastTouchCenter.x) / camera.zoom; camera.y -= (center.y - lastTouchCenter.y) / camera.zoom;

                lastTouchDist = dist; lastTouchCenter = center;
            } else if (e.touches.length === 1) {
                mouseX = e.touches[0].clientX; mouseY = e.touches[0].clientY; 
                
                if (mobilePanMode && !possessedEntity && lastTouchCenter) {
                    camera.x -= (mouseX - lastTouchCenter.x) / camera.zoom;
                    camera.y -= (mouseY - lastTouchCenter.y) / camera.zoom;
                    lastTouchCenter = { x: mouseX, y: mouseY };
                } else {
                    let w = screenToWorld(mouseX, mouseY);
                    if (draggedObj) { draggedObj.x = w.x - draggedObj.width / 2; draggedObj.y = w.y - draggedObj.height / 2; draggedObj.vy = 0; }
                }
            }
        }, {passive: false});

        canvas.addEventListener('touchend', (e) => { 
            if (e.touches.length < 2) { lastTouchCenter = null; lastTouchDist = null; }
            if (e.touches.length === 0) { isMouseDown = false; draggedObj = null; }
        });

        function spawnEntity(type, x, y) {
            let gy = getGroundY(x);
            if (type === 'Tree') structures.push(new Structure(x - 10, gy - 80, 20, 80, 'tree'));
            else if (type === 'Outhouse') structures.push(new Structure(x - 15, gy - 40, 30, 40, 'outhouse'));
            else if (type === 'Trampoline') structures.push(new Structure(x - 20, gy - 10, 40, 10, 'trampoline'));
            else if (type === 'Trench') structures.push(new Structure(x - 50, gy, 100, 20, 'trench'));
            else if (type === 'Bunker') structures.push(new Structure(x - 30, gy - 50, 60, 50, 'bunker'));
            else if (type === 'Sandbag') structures.push(new Structure(x - 15, gy - 20, 30, 20, 'sandbag'));
            else if (type === 'Watchtower') structures.push(new Structure(x - 20, gy - 120, 40, 120, 'watchtower'));
            else if (type === 'BarbedWire') structures.push(new Structure(x - 40, gy - 20, 80, 20, 'barbed_wire'));
            else if (type === 'Building') structures.push(new Structure(x - 40, gy - 150, 80, 150, 'building'));
            else if (type === 'Tesla') structures.push(new Structure(x - 15, gy - 60, 30, 60, 'tesla'));
            else if (type === 'Artillery') structures.push(new Structure(x - 30, gy - 40, 60, 40, 'artillery'));
            else if (type === 'AAGun') structures.push(new Structure(x - 20, gy - 30, 40, 30, 'aa_gun'));
            else if (type === 'Mine') structures.push(new Structure(x - 10, gy - 5, 20, 5, 'mine'));
            else {
                let ent;
                if (type === 'Soldier') ent = new Soldier(spawnSide, x, y);
                else if (type === 'Civilian') ent = new Civilian(spawnSide, x, y);
                else if (type === 'MachineGunner') ent = new MachineGunner(spawnSide, x, y);
                else if (type === 'Sniper') ent = new Sniper(spawnSide, x, y);
                else if (type === 'Rocketeer') ent = new Rocketeer(spawnSide, x, y);
                else if (type === 'Flamethrower') ent = new Flamethrower(spawnSide, x, y);
                else if (type === 'Engineer') ent = new Engineer(spawnSide, x, y);
                else if (type === 'Medic') ent = new Medic(spawnSide, x, y);
                else if (type === 'Commander') ent = new Commander(spawnSide, x, y);
                else if (type === 'K9') ent = new K9(spawnSide, x, y);
                else if (type === 'Bedwars') ent = new BedwarsPlayer(spawnSide, x, y);
                else if (type === 'EnemySoldier') { ent = new Soldier('enemy', x, y); }
                else if (type === 'Paratrooper') ent = new Paratrooper(spawnSide, x, y);
                else if (type === 'Tank') ent = new Tank(spawnSide, x, y);
                else if (type === 'APC') ent = new APC(spawnSide, x, y);
                else if (type === 'Jeep') ent = new Jeep(spawnSide, x, y);
                else if (type === 'Boat') ent = new Boat(spawnSide, x, y);
                else if (type === 'Juggernaut') ent = new Juggernaut(spawnSide, x, y);
                else if (type === 'Helicopter') ent = new Helicopter(spawnSide, x, y);
                else if (type === 'Plane') ent = new Plane(spawnSide, x, y);
                else if (type === 'UFO') ent = new UFO(spawnSide, x, y);
                else if (type === 'Chair') { ent = new FlyingChair(); ent.x = x; ent.y = y; }
                
                if (ent) {
                    if(ent.constructor.name !== 'FlyingChair') {
                        ent.x = x - ent.width/2; ent.y = y - ent.height/2;
                        if (!ent.isFlying && type !== 'Paratrooper' && y > gy - 50) ent.y = getGroundY(ent.x) - ent.height;
                    }
                    entities.push(ent);
                }
            }
        }

        function generateBattlefield() {
            structures.length = 0; let currentX = window.innerWidth > 768 ? 280 : 20; 
            while (currentX < canvas.width - 100) {
                if (Math.random() < 0.6) {
                    let types = ['trench', 'bunker', 'watchtower', 'barbed_wire', 'mine'];
                    let type = types[Math.floor(Math.random() * types.length)];
                    let width = type === 'trench' || type === 'barbed_wire' ? 80 + Math.random() * 100 : (type === 'watchtower' ? 40 : (type === 'mine' ? 20 : 60));
                    let height = type === 'trench' || type === 'barbed_wire' ? 20 : (type === 'watchtower' ? 120 : (type === 'mine' ? 5 : 50));
                    structures.push(new Structure(currentX, getGroundY(currentX) - (type==='bunker'||type==='watchtower'?height:0), width, height, type));
                    currentX += width + (Math.random() * 100 + 50);
                } else currentX += 100; 
            }
        }

        function interpolateColor(color1, color2, factor) {
            let result = color1.slice(); for (let i = 0; i < 3; i++) result[i] = Math.round(result[i] + factor * (color2[i] - color1[i]));
            return `rgb(${result[0]}, ${result[1]}, ${result[2]})`;
        }

        function updateTime() {
            gameTime += 0.000333; if (gameTime >= 24) { gameTime = 0; dayCount++; }
            let hours = Math.floor(gameTime), mins = Math.floor((gameTime - hours) * 60).toString().padStart(2, '0');
            document.getElementById('time-display').innerText = `Day ${dayCount} | ${hours.toString().padStart(2, '0')}:${mins}`;
            
            document.getElementById('wind-display').innerText = Math.round(globalWind * 10); 
            
            let allies = 0, enemies = 0, civs = 0;
            for(let e of entities) { 
                if(!e.dead && e.constructor.name !== 'FlyingChair' && e.constructor.name !== 'NukeMissile') { 
                    if(e.side === 'civilian') civs++;
                    else if(e.isEnemy) enemies++; 
                    else allies++; 
                } 
            }
            document.getElementById('count-ally').innerText = allies; document.getElementById('count-enemy').innerText = enemies; document.getElementById('count-civ').innerText = civs;
        }

        function drawSkyAndLighting() {
            const colors = { night: [5, 5, 15], sunrise: [255, 123, 84], day: [74, 144, 226], sunset: [253, 94, 83], storm: [30, 30, 40] };
            let skyColor, ambientDarkness, sunY, sunX = ((gameTime - 6) / 12) * canvas.width, moonX = ((gameTime < 6 ? gameTime + 18 : gameTime - 6) / 24) * canvas.width;

            if (currentMap.type === 'alien') { skyColor = '#2a001a'; ambientDarkness = 0.2; 
            } else if (currentWeather === 'thunderstorm') { skyColor = `rgb(${colors.storm[0]}, ${colors.storm[1]}, ${colors.storm[2]})`; ambientDarkness = 0.6;
            } else {
                if (gameTime >= 4 && gameTime < 8) { let f = (gameTime - 4) / 4; skyColor = interpolateColor(colors.night, colors.sunrise, f); ambientDarkness = 0.7 - (f * 0.7);
                } else if (gameTime >= 8 && gameTime < 16) { let f = (gameTime - 8) / 8; skyColor = interpolateColor(colors.sunrise, colors.day, f); ambientDarkness = 0;
                } else if (gameTime >= 16 && gameTime < 20) { let f = (gameTime - 16) / 4; skyColor = interpolateColor(colors.day, colors.sunset, f); ambientDarkness = f * 0.5;
                } else { let f = gameTime >= 20 ? (gameTime - 20) / 4 : 1; skyColor = interpolateColor(colors.sunset, colors.night, f); ambientDarkness = 0.5 + (f * 0.3); }
            }
            
            if(isDisco && gameTime % 0.1 < 0.05) skyColor = `hsl(${Date.now() % 360}, 100%, 50%)`;

            ctx.fillStyle = skyColor; ctx.fillRect(0, 0, canvas.width, canvas.height);

            if (currentWeather === 'thunderstorm') {
                if (Math.random() < 0.005) { 
                    lightningFlash = 1.0; audioSystem.thunder(); 
                    let startX = camera.x + (Math.random()-0.5) * canvas.width/camera.zoom; let endX = startX + (Math.random()-0.5) * 400;
                    lightningBolts.push({ path: generateLightningPath(startX, camera.y - canvas.height/camera.zoom, endX, getGroundY(endX), 20, 60), life: 20, color: '#eef', maxThickness: 6 });

                        else if (wMouse.x > this.x + 10) { this.x += this.speed * 2; }
                        if (wMouse.y < this.y - 10) { this.y -= this.speed * 2; }
                        else if (wMouse.y > this.y + 10) { this.y += this.speed * 2; }
                    }

                    if (isMouseDown) {
                        this.beamActive = true;
                        for(let e of entities) { if(!e.dead && e !== this && Math.abs(e.x - (this.x+this.width/2)) < 30 && e.y > this.y) { e.y -= 5; e.vy = 0; e.isFlying = true; setTimeout(()=>{e.isFlying=false;}, 500); } }
                        for(let r of ragdolls) { if(Math.abs(r.points[0].x - (this.x+this.width/2)) < 30 && r.points[0].y > this.y) { r.points.forEach(p=>{p.y-=5; p.oldy=p.y;}); } }
                    }
                    return;
                }

                this.beamActive = false;
                if (this.scanForTarget(300)) {
                    if (Math.abs(this.target.x - this.x) > 10) { this.x += this.target.x > this.x ? this.speed : -this.speed; }
                    else { 
                        this.beamActive = true; 
                        this.target.y -= 3; this.target.vy = 0; this.target.isFlying = true; setTimeout(()=>{if(this.target) this.target.isFlying=false;}, 500);
                        if (this.target.y < this.y + 20) { this.target.health = 0; audioSystem.hit(); } 
                    }
                } else { this.x += this.speed * this.dir; if(Math.random()<0.01) this.dir *= -1; }
            }
            draw() {
                if (this.dead) return; 
                if (this.beamActive) { ctx.fillStyle = 'rgba(0, 255, 255, 0.4)'; ctx.fillRect(this.x + 10, this.y + 20, 40, canvas.height); bloomCtx.fillStyle = 'rgba(0, 255, 255, 0.2)'; bloomCtx.fillRect(this.x + 10, this.y + 20, 40, canvas.height); }
                ctx.fillStyle = this.color; ctx.beginPath(); ctx.ellipse(this.x+30, this.y+10, 30, 10, 0, 0, Math.PI*2); ctx.fill();
                ctx.fillStyle = '#0ff'; ctx.beginPath(); ctx.ellipse(this.x+30, this.y+5, 15, 8, 0, Math.PI, 0); ctx.fill(); bloomCtx.fillStyle = '#0ff'; bloomCtx.beginPath(); bloomCtx.ellipse(this.x+30, this.y+5, 15, 8, 0, Math.PI, 0); bloomCtx.fill();
                if(this.isPossessed) { ctx.fillStyle = '#0f0'; ctx.beginPath(); ctx.moveTo(this.x+30, this.y - 15); ctx.lineTo(this.x+25, this.y - 25); ctx.lineTo(this.x+35, this.y - 25); ctx.fill(); }
            }
        }

        class FlyingChair {
            constructor() { this.width = 30; this.height = 40; this.isFlying = true; this.dead = false; this.x = camera.x; this.y = camera.y - canvas.height/camera.zoom; this.vy = 2; this.timer = 180; }
            update() { this.y += this.vy; this.x += Math.sin(Date.now() / 150) * 4; this.timer--; if (this.timer <= 0 && !isBSOD) triggerBSOD(); }
            draw() {
                ctx.fillStyle = '#8b4513'; ctx.fillRect(Math.trunc(this.x), Math.trunc(this.y) + 20, 30, 10); ctx.fillRect(Math.trunc(this.x), Math.trunc(this.y), 10, 40); ctx.fillRect(Math.trunc(this.x) + 20, Math.trunc(this.y) + 30, 10, 10); 
                ctx.fillStyle = `rgba(0, 255, 255, ${Math.random()})`; ctx.beginPath(); ctx.arc(this.x + 15, this.y + 20, 30 + Math.random()*10, 0, Math.PI*2); ctx.fill();
            }
        }

        class NukeMissile {
            constructor(x) { this.width = 30; this.height = 100; this.x = x - 15; this.y = camera.y - canvas.height/camera.zoom - 200; this.vy = 5; this.dead = false; this.isFlying = true; }
            update() {
                this.y += this.vy; addParticle(this.x+15, this.y, (Math.random()-0.5)*5, -5, '#ff4500', 40, 6, 'flame'); let gy = getGroundY(this.x);
                if (this.y >= gy - this.height) {
                    this.dead = true; screenShake = 60; nukeFlash = 1.0; createExplosion(this.x+15, gy, 400, false); destroyTerrain(this.x+15, 250); 
                    structures.forEach(s => s.destroyed = true); entities.forEach(e => { if(e.health) e.health = -1000; });
                }
            }
            draw() {
                ctx.fillStyle = '#444'; ctx.fillRect(Math.trunc(this.x), Math.trunc(this.y), this.width, this.height);
                ctx.fillStyle = '#f00'; ctx.beginPath(); ctx.moveTo(this.x, this.y); ctx.lineTo(this.x+this.width, this.y); ctx.lineTo(this.x+this.width/2, this.y-30); ctx.fill();
                ctx.fillStyle = '#ee0'; ctx.beginPath(); ctx.arc(this.x+15, this.y+40, 10, 0, Math.PI*2); ctx.fill(); ctx.fillStyle = '#000'; ctx.beginPath(); ctx.moveTo(this.x+15, this.y+40); ctx.lineTo(this.x+15, this.y+30); ctx.stroke();
            }
        }

        // --- MAIN LOOP ---
        function animate() {
            requestAnimationFrame(animate);

            if (isBSOD) return; 

            // FPS LIMITER
            now = performance.now(); elapsed = now - then; if (elapsed <= fpsInterval) return; then = now - (elapsed % fpsInterval);

            // WIND LOGIC
            if (Math.random() < 0.02) targetWind = (Math.random() - 0.5) * 8;
            if (currentWeather === 'thunderstorm' || tornadoes.length > 0) targetWind = (Math.random() - 0.5) * 20;
            globalWind += (targetWind - globalWind) * 0.05;

            // CAMERA FOLLOW POSSESSED ENTITY
            if (possessedEntity && !possessedEntity.dead) {
                camera.x += (possessedEntity.x + possessedEntity.width/2 - camera.x) * 0.1;
                camera.y += (possessedEntity.y + possessedEntity.height/2 - camera.y) * 0.1;
            } else {
                let camSpeed = 10 / camera.zoom;
                if (keys['w'] || keys['arrowup']) camera.y -= camSpeed;
                if (keys['s'] || keys['arrowdown']) camera.y += camSpeed;
                if (keys['a'] || keys['arrowleft']) camera.x -= camSpeed;
                if (keys['d'] || keys['arrowright']) camera.x += camSpeed;
            }
            camera.zoom += (camera.targetZoom - camera.zoom) * 0.1;

            let darkness = drawSkyAndLighting();
            drawParallaxBackground(darkness);

            ctx.save(); ctx.translate(canvas.width/2, canvas.height/2);
            if (screenShake > 0) { ctx.translate((Math.random()-0.5)*screenShake, (Math.random()-0.5)*screenShake); screenShake--; }
            ctx.scale(camera.zoom, camera.zoom); ctx.translate(-camera.x, -camera.y);

            if ((currentWeather === 'rain' || currentWeather === 'thunderstorm') && Math.random() < 0.8) {
                addParticle(camera.x + (Math.random()-0.5)*canvas.width/camera.zoom - globalWind*10, camera.y - canvas.height/(2*camera.zoom), (Math.random()-0.5), 15, 'rgba(150, 180, 255, 0.4)', 150, 2, 'weather');
            } else if (currentWeather === 'snow' && Math.random() < 0.4) {
                addParticle(camera.x + (Math.random()-0.5)*canvas.width/camera.zoom - globalWind*10, camera.y - canvas.height/(2*camera.zoom), (Math.random()-0.5)*2, 3, 'rgba(255, 255, 255, 0.8)', 300, Math.random()*3+2, 'weather');
            }

            ctx.fillStyle = currentMap.ground; ctx.beginPath();
            let startX = camera.x - canvas.width/(2*camera.zoom); let endX = camera.x + canvas.width/(2*camera.zoom);
            let camBottom = camera.y + canvas.height/(2*camera.zoom) + 1500; let fillBottom = Math.max(canvas.height + 500, camBottom);
            
            ctx.moveTo(startX - 100, fillBottom);
            for(let x = startX - 100; x < endX + 100; x += 4) { ctx.lineTo(x, getGroundY(x)); }
            ctx.lineTo(endX + 100, fillBottom); ctx.fill();

            if (globalWaterLevel < fillBottom) {
                ctx.fillStyle = 'rgba(0, 150, 255, 0.4)'; ctx.fillRect(startX - 100, globalWaterLevel, (endX - startX) + 200, fillBottom - globalWaterLevel);
                ctx.fillStyle = 'rgba(255, 255, 255, 0.2)';
                for(let wx = startX - 100; wx < endX + 100; wx += 20) { ctx.fillRect(wx + Math.sin(Date.now()/200 + wx + globalWind)*10, globalWaterLevel, 10, 2); }
            }

            for(let i = tornadoes.length - 1; i >= 0; i--) {
                let t = tornadoes[i]; t.x += t.vx + globalWind*0.1; t.life--;
                ctx.fillStyle = `rgba(150, 150, 150, 0.4)`;
                for(let j=0; j<25; j++) { let w = 15 + j*4; ctx.fillRect(t.x - w/2 + Math.sin(Date.now()/100 + j)*15, getGroundY(t.x) - j*15, w, 15); }
                entities.forEach(e => { if(!e.dead && Math.abs(e.x - t.x) < 100) { e.x += (t.x - e.x)*0.05; e.vy -= 1.5; } });
                particles.forEach(p => { if(Math.abs(t.x - p.x) < 80) { p.vx += (t.x - p.x)*0.05; p.vy -= 2; } });
                ragdolls.forEach(r => { if(Math.abs(r.points[0].x - t.x) < 100) { r.points.forEach(p => {p.oldx -= (t.x - p.x)*0.01; p.oldy += 1;}); } });
                if(t.life <= 0) tornadoes.splice(i, 1);
            }

            for (let s of structures) s.draw();

            if (Math.random() < 0.01 && entities.length < 80) {
                let r = Math.random();
                if (r < 0.3) entities.push(new Soldier()); 
                else if (r < 0.4) entities.push(new Civilian()); 
                else if (r < 0.6) entities.push(new MachineGunner()); 
                else if (r < 0.7) entities.push(new Sniper()); 
                else if (r < 0.8) entities.push(new Rocketeer()); 
                else entities.push(new Medic());
            }

            for (let i = entities.length - 1; i >= 0; i--) {
                entities[i].update(); entities[i].draw();
                if (entities[i].dead || Math.abs(entities[i].x - camera.x) > canvas.width/camera.zoom + 1000 || entities[i].y > canvas.height + 1500) entities.splice(i, 1);
            }
            
            for (let i = ragdolls.length - 1; i >= 0; i--) { ragdolls[i].update(); ragdolls[i].draw(); if(ragdolls[i].life <= 0) ragdolls.splice(i, 1); }

            bloomCtx.clearRect(0, 0, bloomCanvas.width, bloomCanvas.height); bloomCtx.save();
            bloomCtx.translate(bloomCanvas.width/2, bloomCanvas.height/2); bloomCtx.scale(camera.zoom, camera.zoom); bloomCtx.translate(-camera.x, -camera.y);

            // LIGHTMAP & BLOOM RENDERING
            if (darkness > 0.05 || isDisco) {
                lightCtx.clearRect(0, 0, canvas.width, canvas.height); lightCtx.globalCompositeOperation = 'source-over';
                lightCtx.fillStyle = `rgba(0, 0, 15, ${isDisco ? 0.3 : darkness})`; lightCtx.fillRect(0, 0, canvas.width, canvas.height);
                lightCtx.globalCompositeOperation = 'destination-out'; lightCtx.save(); lightCtx.translate(canvas.width/2, canvas.height/2);
                lightCtx.scale(camera.zoom, camera.zoom); lightCtx.translate(-camera.x, -camera.y);

                function drawLight(x, y, radius, intensity) {
                    let g = lightCtx.createRadialGradient(x, y, 0, x, y, radius);
                    g.addColorStop(0, `rgba(255,255,255,${intensity})`); g.addColorStop(1, 'rgba(255,255,255,0)');
                    lightCtx.fillStyle = g; lightCtx.beginPath(); lightCtx.arc(x, y, radius, 0, Math.PI*2); lightCtx.fill();
                }

                for (let p of particles) {
                    if (p.type === 'explosion') drawLight(p.x, p.y, p.size * 5, 0.8);
                    if (p.type === 'flame') drawLight(p.x, p.y, p.size * 4, 0.6);
                    if (p.type === 'rocket') drawLight(p.x, p.y, 40, 0.4);
                }
                for (let l of orbitalLasers) drawLight(l.x, getGroundY(l.x)/2, l.radius*10, 1.0);
                if (nukeFlash > 0) drawLight(camera.x, camera.y, canvas.width/camera.zoom, nukeFlash);
                
                for (let lb of lightningBolts) { for(let p=0; p<lb.path.length; p+=2) drawLight(lb.path[p].x, lb.path[p].y, 40, (lb.life/20) * 0.6); }

                if (gameTime <= 5 || gameTime >= 19) {
                    let moonX = camera.x + ((gameTime < 6 ? gameTime+18 : gameTime-6) / 24) * canvas.width - canvas.width/2;
                    let moonY = camera.y - canvas.height/camera.zoom/2 + 100; drawLight(moonX, moonY, 300, 0.5);
                }
                lightCtx.restore(); ctx.save(); ctx.setTransform(1, 0, 0, 1, 0, 0); ctx.drawImage(lightCanvas, 0, 0); ctx.restore(); 
            }

            for (let i = particles.length - 1; i >= 0; i--) {
                let p = particles[i]; p.update(); p.draw(ctx);
                if (p.type === 'bullet' || p.type === 'rocket' || p.type === 'flame' || p.type === 'explosion') { p.draw(bloomCtx); }

                if (p.type === 'bullet' || p.type === 'bomb' || p.type === 'rocket' || p.type === 'artillery_shell' || p.type === 'flame' || p.type === 'flak' || p.type === 'arrow' || p.type === 'banana_bomb') {
                    for (let e of entities) {
                        if (!e.dead && e.side !== p.isEnemy && p.x > e.x && p.x < e.x + e.width && p.y > e.y && p.y < e.y + e.height) { 
                            if (e.cover && Math.random() < 0.7 && (p.type === 'bullet' || p.type === 'arrow')) { p.life = 0; break; } 
                            let prev = e.health; e.health -= p.damage;
                            
                            if(e.health <= 0 && prev > 0 && e.width <= 15) ragdolls.push(new Ragdoll(e.x+e.width/2, e.y, e.color, p.vx*0.5, p.vy*0.5));
                            if (p.type === 'bomb' || p.type === 'rocket' || p.type === 'artillery_shell' || p.type === 'flak' || p.type === 'banana_bomb') createExplosion(p.x, p.y, 35, true, 80);
                            else if (p.type === 'flame') addParticle(p.x, p.y, 0, 0, '#ff4500', 10, 4, 'explosion');
                            else { audioSystem.hit(); addParticle(p.x, p.y, 0, 0, '#fff', 5, 4, 'explosion'); }
                            p.life = 0; break;
                        }
                    }
                }

                if (p.type === 'bomb' || p.type === 'rocket' || p.type === 'artillery_shell') {
                    for (let s of structures) if (!s.destroyed && p.x > s.x && p.x < s.x + s.width && p.y > s.y && p.y < s.y + s.height) { createExplosion(p.x, p.y, 40, true, 100); p.life = 0; break; }
                    let gy = getGroundY(p.x); if (p.y >= gy || p.y >= globalWaterLevel) { createExplosion(p.x, Math.min(gy, globalWaterLevel), 40, true, 80); p.life = 0; }
                }

                if (p.life <= 0) particles.splice(i, 1);
            }

            for (let i = orbitalLasers.length - 1; i >= 0; i--) {
                let l = orbitalLasers[i]; l.life--; let gy = getGroundY(l.x);
                ctx.fillStyle = `rgba(0, 255, 255, ${l.life / 60})`; ctx.fillRect(l.x - l.radius, camera.y - canvas.height/camera.zoom, l.radius * 2, gy - (camera.y - canvas.height/camera.zoom));
                ctx.fillStyle = `rgba(255, 255, 255, ${l.life / 60})`; ctx.fillRect(l.x - l.radius/2, camera.y - canvas.height/camera.zoom, l.radius, gy - (camera.y - canvas.height/camera.zoom));
                bloomCtx.fillStyle = `rgba(0, 255, 255, ${l.life / 60})`; bloomCtx.fillRect(l.x - l.radius, camera.y - canvas.height/camera.zoom, l.radius * 2, gy - (camera.y - canvas.height/camera.zoom));

                damageArea(l.x, gy, 20); destroyTerrain(l.x, 5); createExplosion(l.x + (Math.random()-0.5)*l.radius*2, gy, 2, false, 0);
                if(l.life <= 0) orbitalLasers.splice(i, 1);
            }

            for (let i = lightningBolts.length - 1; i >= 0; i--) {
                let lb = lightningBolts[i]; lb.life--;
                ctx.strokeStyle = lb.color; ctx.lineWidth = Math.max(1, lb.maxThickness * (lb.life / 10));
                bloomCtx.strokeStyle = lb.color; bloomCtx.lineWidth = Math.max(1, lb.maxThickness * (lb.life / 10));
                ctx.beginPath(); bloomCtx.beginPath();
                ctx.moveTo(lb.path[0].x, lb.path[0].y); bloomCtx.moveTo(lb.path[0].x, lb.path[0].y);
                for(let p=1; p<lb.path.length; p++) { ctx.lineTo(lb.path[p].x, lb.path[p].y); bloomCtx.lineTo(lb.path[p].x, lb.path[p].y); }
                ctx.stroke(); bloomCtx.stroke();
                if(lb.life <= 0) lightningBolts.splice(i, 1);
            }

            // Draw target reticle if possessed
            if (possessedEntity && !possessedEntity.dead) {
                let wMouse = screenToWorld(mouseX, mouseY);
                ctx.strokeStyle = 'rgba(0, 255, 0, 0.5)'; ctx.lineWidth = 2;
                ctx.beginPath(); ctx.arc(wMouse.x, wMouse.y, 10, 0, Math.PI*2); ctx.stroke();
                ctx.beginPath(); ctx.moveTo(wMouse.x-15, wMouse.y); ctx.lineTo(wMouse.x+15, wMouse.y); ctx.stroke();
                ctx.beginPath(); ctx.moveTo(wMouse.x, wMouse.y-15); ctx.lineTo(wMouse.x, wMouse.y+15); ctx.stroke();
            }

            ctx.restore(); bloomCtx.restore();

            ctx.save(); ctx.globalCompositeOperation = 'lighter'; ctx.filter = 'blur(8px)'; ctx.setTransform(1, 0, 0, 1, 0, 0); 
            ctx.drawImage(bloomCanvas, 0, 0); ctx.filter = 'blur(2px)'; ctx.drawImage(bloomCanvas, 0, 0); ctx.restore();

            if (nukeFlash > 0) { ctx.fillStyle = `rgba(255, 255, 255, ${nukeFlash})`; ctx.fillRect(0, 0, canvas.width, canvas.height); nukeFlash -= 0.02; }
            updateTime();
        }

        resize(); window.addEventListener('resize', resize); animate();
    </script>
</body>
